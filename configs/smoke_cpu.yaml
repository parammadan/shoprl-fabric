# CPU smoke config — proves the full GRPO loop runs end-to-end on an 8GB M1
# without MPS memory thrash. Small + CPU = steady and guaranteed to complete.
# NOT for real training (that's GPU, see configs/grpo_qwen_06b.yaml).
experiment:
  name: shoprl-grpo-smoke
  seed: 0

model:
  name: Qwen/Qwen3-0.6B
  dtype: auto
  device: cpu         # avoid MPS over-allocation/swap on 8GB

algorithm: grpo

rollout:
  engine: hf
  max_new_tokens: 24
  temperature: 1.3    # high temp -> output variety -> non-flat groups (real gradient)
  top_p: 0.98
  num_samples: 4      # group size

training:
  steps: 2
  prompts_per_step: 1 # B=4, keeps the CPU smoke fast
  lr: 1.0e-5
  clip_eps: 0.2
  beta: 0.04
  max_grad_norm: 1.0
  lora_r: 8
  lora_alpha: 16
  catalog_size: 300
  shortlist: 4        # shorter prompt -> smaller sequences
  ckpt_dir: checkpoints
