# First REAL GRPO training run — AWS spot g5.xlarge (A10G 24GB).
#   python -m shoprl.train --config configs/grpo_qwen_06b_aws.yaml
# Sized for the A10G with the memory lessons from the T4 baked in: fp32 (the
# validated path; 24GB has ample room), gradient checkpointing (in the trainer),
# and a batch that fits comfortably. Modest first run (~1hr / ~$0.50 spot).
experiment:
  name: grpo-qwen-0.6b-aws-run1
  seed: 0

model:
  name: Qwen/Qwen3-0.6B
  dtype: float32       # validated path; A10G 24GB fits it easily w/ grad ckpt
  device: auto         # -> cuda

algorithm: grpo

rollout:
  engine: hf           # hf generate is fine for 0.6B on GPU; vLLM is the next
                       # rollout-speed upgrade
  max_new_tokens: 128  # room for 1-2 full REC lines + reasoning
  temperature: 1.0     # sampling diversity for within-group spread
  top_p: 0.95
  num_samples: 8       # GRPO group size

training:
  steps: 100           # modest first run; reward curve should show before this
  # B = prompts_per_step * num_samples = 16. With gradient checkpointing + the
  # ref-forward-first reorder, this sits well within 24GB (T4 OOM'd at fp32
  # only because of T^2 attention activations, now recomputed not stored).
  prompts_per_step: 2
  lr: 1.0e-5           # conservative LoRA LR for RL
  clip_eps: 0.2
  beta: 0.04           # KL coeff (DeepSeekMath default); first lever to tune
  max_grad_norm: 1.0
  lora_r: 16
  lora_alpha: 32
  catalog_size: 300
  shortlist: 6
  ckpt_dir: checkpoints
  save_every: 25       # spot-interruption safety

rewards:
  weights:
    budget: 0.25
    groundedness: 0.25
    coverage: 0.25
    quality_format: 0.15
    quality_comparison: 0.10
  hallucination_penalty: 0.50
