# DELIBERATELY oversized batch to trigger a GENUINE CUDA OutOfMemoryError on a
# single A10G (22GB) — for the REAL OOM-recovery demo. batch = 4 * 16 = 64 at
# max_new_tokens 128 overflows the LM-head logits + attention on the backward
# pass. The control plane catches the REAL torch.cuda.OutOfMemoryError, shrinks
# the batch, restores the latest checkpoint (from a prior shoprl-demo run), and
# resumes — logging a RecoveryEvent visible live in the dashboard.
#
# Use SAME experiment name as demo_gpu.yaml so recovery restores that run's
# checkpoint. Run demo_gpu.yaml first (to produce a checkpoint), then submit this.
# This is NOT the simulated OOM — it is a real device OOM on real hardware.
experiment:
  name: shoprl-demo
  seed: 0

model:
  name: Qwen/Qwen3-0.6B
  dtype: float16
  device: auto

algorithm: grpo

rollout:
  engine: hf
  max_new_tokens: 128     # long sequences -> big logits/activations
  temperature: 1.3
  top_p: 0.98
  num_samples: 16         # oversized GRPO group

training:
  steps: 8
  prompts_per_step: 4     # effective batch = 4 * 16 = 64  -> OOMs the A10G
  lr: 2.0e-5
  clip_eps: 0.2
  beta: 0.04
  max_grad_norm: 1.0
  lora_r: 8
  lora_alpha: 16
  catalog_size: 300
  shortlist: 10
  ckpt_dir: checkpoints
  save_every: 1000

rewards:
  weights:
    budget: 0.10
    groundedness: 0.15
    coverage: 0.30
    quality_format: 0.10
    quality_comparison: 0.35
  hallucination_penalty: 0.50
